services:
  app:
    build: .
    container_name: sovereignty-checklist
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=file:/app/data/sovereignty.db
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    volumes:
      - app-data:/app/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL

volumes:
  app-data:
    driver: local
